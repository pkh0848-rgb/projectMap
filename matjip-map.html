<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍽 브라운스톤 맛집 지도</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0f0f13; --surface: #1a1a24; --card: #22222e;
  --border: rgba(255,255,255,0.08); --text: #f0f0f5; --muted: #888899;
  --한식: #ff6b6b; --고기: #ff8c42; --일식: #4ecdc4;
  --이탈리안: #a8e063; --태국: #f7dc6f; --중식: #e056d6;
  --스테이크: #c0392b; --카페브런치: #74b9ff;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; z-index: 1000; }
.header-title { font-size: 15px; font-weight: 900; letter-spacing: -0.5px; }
.header-sub { font-size: 11px; color: var(--muted); }
.count-badge { margin-left: auto; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 700; }
.filter-bar2 { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
.filter-bar2::-webkit-scrollbar { display: none; }
.filter2-label { font-size: 10px; font-weight: 700; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
.filter2-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
.f2btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 11px; border-radius: 14px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif; flex-shrink: 0; }
.f2btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.f2btn.active { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.4); color: #fff; }
.f2btn.price1.active { background: rgba(100,220,120,0.15); border-color: #64dc78; color: #64dc78; }
.f2btn.price2.active { background: rgba(255,200,80,0.15); border-color: #ffc850; color: #ffc850; }
.f2btn.price3.active { background: rgba(255,100,100,0.15); border-color: #ff6464; color: #ff6464; }
.f2btn.parking.active { background: rgba(100,180,255,0.15); border-color: #64b4ff; color: #64b4ff; }
.filter-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif; }
.filter-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.filter-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.filter-btn.active { color: #fff; border-color: currentColor; }
.filter-btn[data-cat="전체"].active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); color: #fff; }
.filter-btn[data-cat="한식"].active { background: rgba(255,107,107,0.15); border-color: var(--한식); color: var(--한식); }
.filter-btn[data-cat="고기"].active { background: rgba(255,140,66,0.15); border-color: var(--고기); color: var(--고기); }
.filter-btn[data-cat="일식"].active { background: rgba(78,205,196,0.15); border-color: var(--일식); color: var(--일식); }
.filter-btn[data-cat="이탈리안"].active { background: rgba(168,224,99,0.15); border-color: var(--이탈리안); color: var(--이탈리안); }
.filter-btn[data-cat="태국"].active { background: rgba(247,220,111,0.15); border-color: var(--태국); color: var(--태국); }
.filter-btn[data-cat="중식"].active { background: rgba(224,86,214,0.15); border-color: var(--중식); color: var(--중식); }
.filter-btn[data-cat="스테이크"].active { background: rgba(192,57,43,0.15); border-color: var(--스테이크); color: var(--스테이크); }
.filter-btn[data-cat="카페·브런치"].active { background: rgba(116,185,255,0.15); border-color: var(--카페브런치); color: var(--카페브런치); }
.body { flex: 1; display: flex; overflow: hidden; }
#map { flex: 1; }
.side-panel { width: 320px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.panel-header { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--muted); font-weight: 600; }
.restaurant-list { flex: 1; overflow-y: auto; padding: 8px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }
.restaurant-list::-webkit-scrollbar { width: 4px; }
.restaurant-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.rest-card { padding: 12px 14px; border-radius: 10px; margin-bottom: 6px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; background: var(--card); }
.rest-card:hover { border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); }
.rest-card.selected { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.06); }
.rest-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.rest-cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.rest-cat-label { font-size: 10px; font-weight: 700; }
.rest-rating { margin-left: auto; font-size: 11px; font-weight: 700; color: #ffd700; }
.rest-name { font-size: 13px; font-weight: 700; margin-bottom: 3px; line-height: 1.3; }
.rest-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
.leaflet-popup-content-wrapper { background: var(--card) !important; border: 1px solid rgba(255,255,255,0.15) !important; border-radius: 14px !important; box-shadow: 0 12px 40px rgba(0,0,0,0.6) !important; color: var(--text) !important; padding: 0 !important; }
.leaflet-popup-tip-container { display: none !important; }
.leaflet-popup-content { margin: 0 !important; width: 260px !important; }
.leaflet-popup-close-button { color: rgba(255,255,255,0.4) !important; top:10px !important; right:12px !important; font-size:18px !important; }
.popup-inner { padding: 16px; }
.popup-cat { font-size: 10px; font-weight: 700; margin-bottom: 6px; }
.popup-name { font-size: 15px; font-weight: 900; margin-bottom: 4px; line-height: 1.3; }
.popup-desc { font-size: 11px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
.popup-meta { display: flex; gap: 8px; flex-wrap: wrap; }
.popup-tag { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 3px 8px; font-size: 10px; color: var(--muted); }
.popup-tag.park { border-color: rgba(100,180,255,0.4); color: #64b4ff; }
.custom-marker { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 2px solid rgba(255,255,255,0.3); box-shadow: 0 3px 10px rgba(0,0,0,0.4); cursor: pointer; }
.home-marker { width: 36px; height: 36px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; border: 3px solid rgba(255,255,255,0.5); box-shadow: 0 4px 15px rgba(102,126,234,0.5); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
.tab-btns { display: none; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--muted); font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab-btn.active { color: var(--text); border-bottom-color: #fff; }
@media (max-width: 768px) {
  .tab-btns { display: flex; }
  .body { position: relative; }
  .side-panel { position: absolute; top:0; left:0; right:0; bottom:0; width:100%; z-index:500; display:none; }
  .side-panel.visible { display: flex; }
  #map { width: 100%; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">🍽 맛집 지도</div>
    <div class="header-sub">영신로 브라운스톤 기준</div>
  </div>
  <div class="count-badge" id="countBadge">총 0곳</div>
</div>

<div class="tab-btns">
  <button class="tab-btn active" onclick="showTab('map',this)">🗺 지도</button>
  <button class="tab-btn" onclick="showTab('list',this)">📋 목록</button>
</div>

<!-- 가격대 + 거리 + 주차 필터 -->
<div class="filter-bar2">
  <span class="filter2-label">💰 가격대</span>
  <button class="f2btn price1" onclick="togglePrice(1,this)">~1만원</button>
  <button class="f2btn price2" onclick="togglePrice(2,this)">1~3만원</button>
  <button class="f2btn price3" onclick="togglePrice(3,this)">4만원↑</button>
  <div class="filter2-sep"></div>
  <span class="filter2-label">🚶 거리</span>
  <button class="f2btn active" id="dbtn-all"  onclick="selectDist('all',this)">전체</button>
  <button class="f2btn"        id="dbtn-walk" onclick="selectDist('walk',this)">걸어서가도됨</button>
  <button class="f2btn"        id="dbtn-20"   onclick="selectDist('20',this)">20분이내</button>
  <button class="f2btn"        id="dbtn-40"   onclick="selectDist('40',this)">40분이내</button>
  <button class="f2btn"        id="dbtn-60"   onclick="selectDist('60',this)">60분이내</button>
  <div class="filter2-sep"></div>
  <button class="f2btn parking" id="parkingBtn" onclick="toggleParking(this)">🅿 주차가능</button>
</div>

<!-- 카테고리 필터 — 복수선택 -->
<div class="filter-bar">
  <button class="filter-btn active" data-cat="전체"       onclick="filterCat('전체',this)"><span class="dot" style="background:#fff"></span> 전체</button>
  <button class="filter-btn"        data-cat="한식"        onclick="filterCat('한식',this)"><span class="dot" style="background:var(--한식)"></span> 한식</button>
  <button class="filter-btn"        data-cat="고기"        onclick="filterCat('고기',this)"><span class="dot" style="background:var(--고기)"></span> 고기·구이</button>
  <button class="filter-btn"        data-cat="일식"        onclick="filterCat('일식',this)"><span class="dot" style="background:var(--일식)"></span> 일식·라멘</button>
  <button class="filter-btn"        data-cat="이탈리안"    onclick="filterCat('이탈리안',this)"><span class="dot" style="background:var(--이탈리안)"></span> 이탈리안</button>
  <button class="filter-btn"        data-cat="태국"        onclick="filterCat('태국',this)"><span class="dot" style="background:var(--태국)"></span> 태국·아시안</button>
  <button class="filter-btn"        data-cat="중식"        onclick="filterCat('중식',this)"><span class="dot" style="background:var(--중식)"></span> 중식</button>
  <button class="filter-btn"        data-cat="스테이크"    onclick="filterCat('스테이크',this)"><span class="dot" style="background:var(--스테이크)"></span> 스테이크·양식</button>
  <button class="filter-btn"        data-cat="카페·브런치" onclick="filterCat('카페·브런치',this)"><span class="dot" style="background:var(--카페브런치)"></span> 카페·브런치</button>
</div>

<div class="body">
  <div id="map"></div>
  <div class="side-panel">
    <div class="panel-header" id="panelHeader">목록 로딩 중...</div>
    <div class="restaurant-list" id="restaurantList"></div>
  </div>
</div>

];

let map, markers=[];
let selectedCats=new Set(), selectedPrices=new Set(), selectedDist='all', selectedParking=false;

map=L.map('map',{zoomControl:false,preferCanvas:true}).setView([37.530,126.916],13);
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19,subdomains:'abcd'}).addTo(map);
const homeIcon=L.divIcon({className:'',html:'<div class="home-marker">🏠</div>',iconAnchor:[18,18]});
L.marker([37.5276,126.9019],{icon:homeIcon}).addTo(map).bindPopup('<div style="background:#22222e;color:#f0f0f5;padding:12px;border-radius:10px;font-family:Noto Sans KR,sans-serif"><b>🏠 우리집</b><br><span style="font-size:11px;color:#888">영신로 55길 8 브라운스톤</span></div>');

const COLOR_MAP={'한식':'#ff6b6b','고기':'#ff8c42','일식':'#4ecdc4','이탈리안':'#a8e063','태국':'#f7dc6f','중식':'#e056d6','스테이크':'#c0392b','카페·브런치':'#74b9ff'};
function getColor(c){return COLOR_MAP[c]||'#888';}
function getEmoji(c){return CATS[c]?.emoji||'🍽';}

function getFiltered(){
  return RESTAURANTS.filter(r=>{
    const catOk=selectedCats.size===0||selectedCats.has(r.cat);
    const priceOk=selectedPrices.size===0||selectedPrices.has(r.price);
    const parkOk=!selectedParking||r.parking===true;
    let distOk=true;
    if(selectedDist==='walk')distOk=r.dist==='walk';
    else if(selectedDist==='20')distOk=r.dist==='walk'||r.dist==='20';
    else if(selectedDist==='40')distOk=r.dist==='walk'||r.dist==='20'||r.dist==='40';
    return catOk&&priceOk&&parkOk&&distOk;
  });
}

function renderMarkers(){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  const filtered=getFiltered();
  filtered.forEach((r,i)=>{
    const color=getColor(r.cat);
    const icon=L.divIcon({className:'',html:`<div class="custom-marker" style="background:${color};border-color:rgba(255,255,255,0.4)">${getEmoji(r.cat)}</div>`,iconAnchor:[16,16]});
    const marker=L.marker([r.lat,r.lng],{icon}).addTo(map);
    marker.bindPopup(`<div class="popup-inner"><div class="popup-cat" style="color:${color}">${getEmoji(r.cat)} ${r.cat}</div><div class="popup-name">${r.name}</div><div class="popup-desc">${r.desc}</div><div class="popup-meta"><span class="popup-tag">⭐ ${r.rating}</span><span class="popup-tag">📍 ${r.area}</span><span class="popup-tag">${PRICE_LABEL[r.price]}</span><span class="popup-tag">${DIST_LABEL[r.dist]}</span>${r.parking?'<span class="popup-tag park">🅿 주차가능</span>':''}</div></div>`,{maxWidth:280});
    marker.on('click',()=>selectItem(i,filtered));
    markers.push(marker);
  });
  renderList(filtered);
  document.getElementById('countBadge').textContent=`${filtered.length}곳 표시 중`;
}

function renderList(filtered){
  const list=document.getElementById('restaurantList');
  const catLabel=selectedCats.size===0?'전체':[...selectedCats].join(', ');
  document.getElementById('panelHeader').textContent=`${catLabel} ${filtered.length}곳`;
  if(!filtered.length){list.innerHTML='<div class="empty-state">해당 조건에 맞는 결과 없음</div>';return;}
  list.innerHTML=filtered.map((r,i)=>{
    const color=getColor(r.cat);
    return `<div class="rest-card" id="card-${i}" onclick="selectItem(${i},null)">
      <div class="rest-card-top">
        <span class="rest-cat-dot" style="background:${color}"></span>
        <span class="rest-cat-label" style="color:${color}">${r.cat}</span>
        <span style="font-size:10px;color:#aaa;margin-left:2px">${PRICE_LABEL[r.price]}</span>
        ${r.parking?'<span style="font-size:10px;color:#64b4ff;margin-left:2px">🅿</span>':''}
        <span class="rest-rating">⭐ ${r.rating}</span>
      </div>
      <div class="rest-name">${r.name}</div>
      <div class="rest-desc">${r.desc} · <span style="color:#666">${r.area}</span> · <span style="color:#555">${DIST_LABEL[r.dist]}</span></div>
    </div>`;
  }).join('');
}

function selectItem(i,filtered){
  const list=filtered||getFiltered();
  const r=list[i];if(!r)return;
  document.querySelectorAll('.rest-card').forEach(c=>c.classList.remove('selected'));
  const card=document.getElementById(`card-${i}`);
  if(card){card.classList.add('selected');card.scrollIntoView({behavior:'smooth',block:'nearest'});}
  if(window.innerWidth<=768)showTab('map',document.querySelector('.tab-btn'));
  map.setView([r.lat,r.lng],15,{animate:true});
  if(markers[i])setTimeout(()=>markers[i].openPopup(),300);
}

// 카테고리 복수선택
function filterCat(cat,btn){
  if(cat==='전체'){
    selectedCats.clear();
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  } else {
    if(selectedCats.has(cat)){selectedCats.delete(cat);btn.classList.remove('active');}
    else{selectedCats.add(cat);btn.classList.add('active');}
    const allBtn=document.querySelector('.filter-btn[data-cat="전체"]');
    allBtn.classList.toggle('active',selectedCats.size===0);
  }
  renderMarkers();
}

function togglePrice(price,btn){
  if(selectedPrices.has(price)){selectedPrices.delete(price);btn.classList.remove('active');}
  else{selectedPrices.add(price);btn.classList.add('active');}
  renderMarkers();
}

function selectDist(dist,btn){
  selectedDist=dist;
  document.querySelectorAll('.filter-bar2 .f2btn[id^="dbtn"]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderMarkers();
}

function toggleParking(btn){
  selectedParking=!selectedParking;
  btn.classList.toggle('active',selectedParking);
  renderMarkers();
}

function showTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const panel=document.querySelector('.side-panel'),mapEl=document.getElementById('map');
  if(tab==='list'){panel.classList.add('visible');mapEl.style.display='none';}
  else{panel.classList.remove('visible');mapEl.style.display='';setTimeout(()=>map.invalidateSize(),100);}
}

renderMarkers();
</script>
