<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍽 브라운스톤 맛집 지도</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0f0f13;
  --surface: #1a1a24;
  --card: #22222e;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f5;
  --muted: #888899;
  --한식: #ff6b6b;
  --고기: #ff8c42;
  --일식: #4ecdc4;
  --이탈리안: #a8e063;
  --태국: #f7dc6f;
  --중식: #e056d6;
  --스테이크: #c0392b;
  --카페브런치: #74b9ff;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* 헤더 */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  z-index: 1000;
}
.header-title { font-size: 15px; font-weight: 900; letter-spacing: -0.5px; }
.header-sub { font-size: 11px; color: var(--muted); }
.count-badge {
  margin-left: auto;
  background: rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 700;
}

/* 카테고리 필터 바 */
.filter-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  font-family: 'Noto Sans KR', sans-serif;
}
.filter-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.filter-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.filter-btn.active { color: #fff; border-color: currentColor; }
.filter-btn[data-cat="전체"].active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); color: #fff; }
.filter-btn[data-cat="한식"].active { background: rgba(255,107,107,0.15); border-color: var(--한식); color: var(--한식); }
.filter-btn[data-cat="고기"].active { background: rgba(255,140,66,0.15); border-color: var(--고기); color: var(--고기); }
.filter-btn[data-cat="일식"].active { background: rgba(78,205,196,0.15); border-color: var(--일식); color: var(--일식); }
.filter-btn[data-cat="이탈리안"].active { background: rgba(168,224,99,0.15); border-color: var(--이탈리안); color: var(--이탈리안); }
.filter-btn[data-cat="태국"].active { background: rgba(247,220,111,0.15); border-color: var(--태국); color: var(--태국); }
.filter-btn[data-cat="중식"].active { background: rgba(224,86,214,0.15); border-color: var(--중식); color: var(--중식); }
.filter-btn[data-cat="스테이크"].active { background: rgba(192,57,43,0.15); border-color: var(--스테이크); color: var(--스테이크); }
.filter-btn[data-cat="카페·브런치"].active { background: rgba(116,185,255,0.15); border-color: var(--카페브런치); color: var(--카페브런치); }

/* 본문 */
.body { flex: 1; display: flex; overflow: hidden; }

/* 지도 */
#map { flex: 1; }

/* 사이드 패널 */
.side-panel {
  width: 320px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
}
.restaurant-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.restaurant-list::-webkit-scrollbar { width: 4px; }
.restaurant-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.rest-card {
  padding: 12px 14px;
  border-radius: 10px;
  margin-bottom: 6px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
  background: var(--card);
}
.rest-card:hover { border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); }
.rest-card.selected { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.06); }

.rest-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.rest-cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.rest-cat-label { font-size: 10px; font-weight: 700; }
.rest-rating { margin-left: auto; font-size: 11px; font-weight: 700; color: #ffd700; }
.rest-name { font-size: 13px; font-weight: 700; margin-bottom: 3px; line-height: 1.3; }
.rest-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }

/* 팝업 커스텀 */
.leaflet-popup-content-wrapper {
  background: var(--card) !important;
  border: 1px solid rgba(255,255,255,0.15) !important;
  border-radius: 14px !important;
  box-shadow: 0 12px 40px rgba(0,0,0,0.6) !important;
  color: var(--text) !important;
  padding: 0 !important;
}
.leaflet-popup-tip-container { display: none !important; }
.leaflet-popup-content { margin: 0 !important; width: 260px !important; }
.leaflet-popup-close-button { color: rgba(255,255,255,0.4) !important; top:10px !important; right:12px !important; font-size:18px !important; }

.popup-inner { padding: 16px; }
.popup-cat { font-size: 10px; font-weight: 700; margin-bottom: 6px; }
.popup-name { font-size: 15px; font-weight: 900; margin-bottom: 4px; line-height: 1.3; }
.popup-desc { font-size: 11px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
.popup-meta { display: flex; gap: 8px; flex-wrap: wrap; }
.popup-tag { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 3px 8px; font-size: 10px; color: var(--muted); }

/* 마커 커스텀 */
.custom-marker {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  box-shadow: 0 3px 10px rgba(0,0,0,0.4);
  cursor: pointer;
  transition: transform 0.15s;
}
.home-marker {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  border: 3px solid rgba(255,255,255,0.5);
  box-shadow: 0 4px 15px rgba(102,126,234,0.5);
}

/* 빈 상태 */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 13px;
}

/* 탭 전환 버튼 (모바일용) */
.tab-btns {
  display: none;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab-btn {
  flex: 1;
  padding: 10px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.tab-btn.active { color: var(--text); border-bottom-color: #fff; }

/* 모바일 */
@media (max-width: 768px) {
  .tab-btns { display: flex; }
  .body { position: relative; }
  .side-panel {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100%;
    z-index: 500;
    display: none;
  }
  .side-panel.visible { display: flex; }
  #map { width: 100%; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">🍽 맛집 지도</div>
    <div class="header-sub">영신로 브라운스톤 기준 차로 40분 이내</div>
  </div>
  <div class="count-badge" id="countBadge">총 0곳</div>
</div>

<div class="tab-btns">
  <button class="tab-btn active" onclick="showTab('map', this)">🗺 지도</button>
  <button class="tab-btn" onclick="showTab('list', this)">📋 목록</button>
</div>
<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-cat="전체" onclick="filterCat('전체', this)">
    <span class="dot" style="background:#fff"></span> 전체
  </button>
  <button class="filter-btn" data-cat="한식" onclick="filterCat('한식', this)">
    <span class="dot" style="background:var(--한식)"></span> 한식

  <button class="filter-btn" data-cat="고기" onclick="filterCat('고기', this)">
    <span class="dot" style="background:var(--고기)"></span> 고기·구이
  </button>
  <button class="filter-btn" data-cat="일식" onclick="filterCat('일식', this)">
    <span class="dot" style="background:var(--일식)"></span> 일식·라멘
  </button>
  <button class="filter-btn" data-cat="이탈리안" onclick="filterCat('이탈리안', this)">
    <span class="dot" style="background:var(--이탈리안)"></span> 이탈리안
  </button>
  <button class="filter-btn" data-cat="태국" onclick="filterCat('태국', this)">
    <span class="dot" style="background:var(--태국)"></span> 태국·아시안
  </button>
  <button class="filter-btn" data-cat="중식" onclick="filterCat('중식', this)">
    <span class="dot" style="background:var(--중식)"></span> 중식

  <button class="filter-btn" data-cat="스테이크" onclick="filterCat('스테이크', this)">

  </button>
  <button class="filter-btn" data-cat="카페·브런치" onclick="filterCat('카페·브런치', this)">
    <span class="dot" style="background:var(--카페브런치)"></span> 카페·브런치
  </button>
</div>

<div class="body">
  <div id="map"></div>
  <div class="side-panel">
    <div class="panel-header" id="panelHeader">목록 로딩 중...</div>
    <div class="restaurant-list" id="restaurantList"></div>
  </div>
</div>

  attribution: '© OpenStreetMap © CARTO', maxZoom: 19, subdomains: 'abcd'
}).addTo(map);

  className: '',
  html: `<div class="home-marker" title="우리집">🏠</div>`,
  iconAnchor: [18, 18]
});
L.marker([37.5276, 126.9019], { icon: homeIcon }).addTo(map)
  .bindPopup('<div style="background:#22222e;color:#f0f0f5;padding:12px;border-radius:10px;font-family:Noto Sans KR,sans-serif"><b style="font-size:14px">🏠 우리집</b><br><span style="font-size:11px;color:#888">영신로 55길 8 브라운스톤</span></div>', { maxWidth: 200 });

function getColor(cat) {
  const key = cat === '카페·브런치' ? '#74b9ff' : `var(--${cat})`;
  const map = { '한식': '#ff6b6b', '고기': '#ff8c42', '일식': '#4ecdc4', '이탈리안': '#a8e063', '태국': '#f7dc6f', '중식': '#e056d6', '스테이크': '#c0392b', '카페·브런치': '#74b9ff' };
  return map[cat] || '#888';
}
function getEmoji(cat) { return CATS[cat]?.emoji || '🍽'; }

function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const filtered = currentCat === '전체' ? RESTAURANTS : RESTAURANTS.filter(r => r.cat === currentCat);

  filtered.forEach((r, i) => {
    const color = getColor(r.cat);
    const icon = L.divIcon({
      className: '',
      html: `<div class="custom-marker" style="background:${color};border-color:rgba(255,255,255,0.4)" title="${r.name}">${getEmoji(r.cat)}</div>`,
      iconAnchor: [16, 16]
    });

    const marker = L.marker([r.lat, r.lng], { icon }).addTo(map);
    marker.bindPopup(`
      <div class="popup-inner">
        <div class="popup-cat" style="color:${color}">${getEmoji(r.cat)} ${r.cat}</div>
        <div class="popup-name">${r.name}</div>
        <div class="popup-desc">${r.desc}</div>
        <div class="popup-meta">
          <span class="popup-tag">⭐ ${r.rating}</span>
          <span class="popup-tag">📍 ${r.area}</span>
        </div>
      </div>
    `, { maxWidth: 280 });

    marker.on('click', () => { selectItem(i, filtered); });
    markers.push(marker);
  });

  renderList(filtered);
  document.getElementById('countBadge').textContent = `${filtered.length}곳 표시 중`;
}

function renderList(filtered) {
  const list = document.getElementById('restaurantList');
  const header = document.getElementById('panelHeader');
  header.textContent = `${currentCat === '전체' ? '전체' : currentCat} ${filtered.length}곳`;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">해당 카테고리 결과 없음</div>';
    return;
  }

  list.innerHTML = filtered.map((r, i) => {
    const color = getColor(r.cat);
    return `
      <div class="rest-card" id="card-${i}" onclick="selectItem(${i}, null)">
        <div class="rest-card-top">
          <span class="rest-cat-dot" style="background:${color}"></span>
          <span class="rest-cat-label" style="color:${color}">${r.cat}</span>
          <span class="rest-rating">⭐ ${r.rating}</span>
        </div>
        <div class="rest-name">${r.name}</div>
        <div class="rest-desc">${r.desc} · <span style="color:#666">${r.area}</span></div>
      </div>
    `;
  }).join('');
}

function selectItem(i, filtered) {
  const list = filtered || (currentCat === '전체' ? RESTAURANTS : RESTAURANTS.filter(r => r.cat === currentCat));
  const r = list[i];
  if (!r) return;

  // 카드 선택
  document.querySelectorAll('.rest-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById(`card-${i}`);
  if (card) { card.classList.add('selected'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }

  // 모바일에서 카드 클릭 시 지도 탭으로 전환
  const isMobile = window.innerWidth <= 768;
  if (isMobile) showTab('map', document.querySelector('.tab-btn'));

  // 지도 이동 & 팝업
  map.setView([r.lat, r.lng], 15, { animate: true });
  if (markers[i]) { setTimeout(() => markers[i].openPopup(), 300); }
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMarkers();
}

function showTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const panel = document.querySelector('.side-panel');
  const mapEl = document.getElementById('map');
  if (tab === 'list') {
    panel.classList.add('visible');
    mapEl.style.display = 'none';
  } else {
    panel.classList.remove('visible');
    mapEl.style.display = '';
    setTimeout(() => map.invalidateSize(), 100);
  }
}

renderMarkers();
</script>
</body>
</html>
